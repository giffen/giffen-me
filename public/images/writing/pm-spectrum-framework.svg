<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 560" fill="none">
  <!-- Grid dodecagons -->
  <path d="M 370,120 L 450,141 L 509,200 L 530,280 L 509,360 L 450,419 L 370,440 L 290,419 L 231,360 L 210,280 L 231,200 L 290,141 Z" stroke="#D0C9BD" stroke-width="1.5" fill="#FAF7F2"/>
  <path d="M 370,160 L 430,176 L 474,220 L 490,280 L 474,340 L 430,384 L 370,400 L 310,384 L 266,340 L 250,280 L 266,220 L 310,176 Z" stroke="#E5DFD5" stroke-width="1" fill="none"/>
  <path d="M 370,200 L 410,211 L 439,240 L 450,280 L 439,320 L 410,349 L 370,360 L 330,349 L 301,320 L 290,280 L 301,240 L 330,211 Z" stroke="#E5DFD5" stroke-width="1" fill="none"/>
  <path d="M 370,240 L 390,245 L 405,260 L 410,280 L 405,300 L 390,315 L 370,320 L 350,315 L 335,300 L 330,280 L 335,260 L 350,245 Z" stroke="#E5DFD5" stroke-width="0.8" fill="none"/>

  <!-- 12 axis lines from center -->
  <g stroke="#D5CFC5" stroke-width="0.8" stroke-linecap="round">
    <line x1="370" y1="280" x2="370" y2="120"/>
    <line x1="370" y1="280" x2="450" y2="141"/>
    <line x1="370" y1="280" x2="509" y2="200"/>
    <line x1="370" y1="280" x2="530" y2="280"/>
    <line x1="370" y1="280" x2="509" y2="360"/>
    <line x1="370" y1="280" x2="450" y2="419"/>
    <line x1="370" y1="280" x2="370" y2="440"/>
    <line x1="370" y1="280" x2="290" y2="419"/>
    <line x1="370" y1="280" x2="231" y2="360"/>
    <line x1="370" y1="280" x2="210" y2="280"/>
    <line x1="370" y1="280" x2="231" y2="200"/>
    <line x1="370" y1="280" x2="290" y2="141"/>
  </g>

  <!-- Quadrant boundary lines (subtle) -->
  <g stroke="#E5DFD5" stroke-width="0.6" stroke-dasharray="4,4">
    <line x1="370" y1="280" x2="483" y2="167"/>
    <line x1="370" y1="280" x2="483" y2="393"/>
    <line x1="370" y1="280" x2="257" y2="393"/>
    <line x1="370" y1="280" x2="257" y2="167"/>
  </g>

  <!-- Colored quadrant arcs at r=175 -->
  <!-- Customer Closeness (rust) 318° to 42° -->
  <path d="M 253,150 A 175,175 0 0 1 487,150" stroke="#B44A3A" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Strategic Direction (blue) 48° to 132° -->
  <path d="M 500,163 A 175,175 0 0 1 500,397" stroke="#3A6B94" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Technical Building (teal) 138° to 222° -->
  <path d="M 487,410 A 175,175 0 0 1 253,410" stroke="#2A7B6B" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Org. Influence (mauve) 228° to 312° -->
  <path d="M 240,397 A 175,175 0 0 1 240,163" stroke="#8B6878" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Axis endpoint dots -->
  <g opacity="0.5">
    <circle cx="370" cy="120" r="3" fill="#B44A3A"/>
    <circle cx="450" cy="141" r="3" fill="#B44A3A"/>
    <circle cx="290" cy="141" r="3" fill="#B44A3A"/>
    <circle cx="509" cy="200" r="3" fill="#3A6B94"/>
    <circle cx="530" cy="280" r="3" fill="#3A6B94"/>
    <circle cx="509" cy="360" r="3" fill="#3A6B94"/>
    <circle cx="450" cy="419" r="3" fill="#2A7B6B"/>
    <circle cx="370" cy="440" r="3" fill="#2A7B6B"/>
    <circle cx="290" cy="419" r="3" fill="#2A7B6B"/>
    <circle cx="231" cy="360" r="3" fill="#8B6878"/>
    <circle cx="210" cy="280" r="3" fill="#8B6878"/>
    <circle cx="231" cy="200" r="3" fill="#8B6878"/>
  </g>

  <!-- Center dot -->
  <circle cx="370" cy="280" r="2.5" fill="#C5BFB5"/>

  <!-- 12 competency labels -->
  <!-- Customer Closeness quadrant (330°, 0°, 30°) -->
  <text x="275" y="126" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">Voice of Customer</text>
  <text x="370" y="100" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">UX Intuition</text>
  <text x="466" y="126" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">Qual. Synthesis</text>

  <!-- Strategic Direction quadrant (60°, 90°, 120°) -->
  <text x="528" y="193" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">Product Vision</text>
  <text x="550" y="284" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">Commercial Acumen</text>
  <text x="528" y="368" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">Market Intel</text>

  <!-- Technical Building quadrant (150°, 180°, 210°) -->
  <text x="466" y="436" text-anchor="start" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">AI-Directed Dev</text>
  <text x="370" y="464" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">Prototyping</text>
  <text x="275" y="436" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">Technical Taste</text>

  <!-- Org. Influence quadrant (240°, 270°, 300°) -->
  <text x="212" y="368" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">Stakeholder Mgmt</text>
  <text x="190" y="284" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">Exec. Comm.</text>
  <text x="212" y="193" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#3D3D3D">Team Leadership</text>

  <!-- Quadrant legend -->
  <g transform="translate(140, 502)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#B44A3A" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <text x="32" y="4" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#B44A3A">Customer Closeness</text>

    <line x1="200" y1="0" x2="224" y2="0" stroke="#3A6B94" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <text x="232" y="4" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#3A6B94">Strategic Direction</text>
  </g>
  <g transform="translate(140, 526)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#2A7B6B" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <text x="32" y="4" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#2A7B6B">Technical Building</text>

    <line x1="200" y1="0" x2="224" y2="0" stroke="#8B6878" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <text x="232" y="4" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#8B6878">Org. Influence</text>
  </g>
</svg>
